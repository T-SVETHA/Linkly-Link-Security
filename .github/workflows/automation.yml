name: CI/CD Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automation-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Running :security-tests:consolidateReports triggers all sub-module tests,
    # generates individual Excel reports, and consolidates the final summary sheet.
    - name: Run Unified Automation Pipeline & Generate Reports
      run: ./gradlew :security-tests:consolidateReports

    # Upload the Excel test reports (.xlsx)
    - name: Upload Excel Quality Assurance Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Quality-Assurance-Reports
        path: reports/

    # Upload screenshots and execution log files
    - name: Upload Automation Screenshots and Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Automation-Screenshots-Logs
        path: |
          reports/screenshots/
          **/build/reports/tests/
          **/build/test-results/
