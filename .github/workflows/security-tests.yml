name: Security Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Execute Security Tests
      run: ./gradlew :security-tests:test

    - name: Publish Test Results to Checks
      uses: mikepenz/action-junit-report@v4
      if: always()
      with:
        report_paths: '**/build/test-results/test/TEST-*.xml'

    - name: Upload Test Reports and Excel Output
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-test-reports
        path: |
          security-tests/build/reports/tests/test/
          security-tests/build/test-results/test/
          security-tests/reports/Vulnerability_Report.xlsx
