name: Security Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Execute Security Tests
      run: npm run test:security

    - name: Upload Test Reports and Excel Output
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-test-reports
        path: reports/SecurityTestReport.xlsx
